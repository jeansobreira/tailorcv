<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 52" width="260" height="52">
  <defs>
    <linearGradient id="grad-primary" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
  </defs>

  <!-- === VERSION: COLOR light bg (default) === -->
  <g id="logo-color">
    <text x="0" y="38"
      font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif"
      font-size="36" font-weight="800" letter-spacing="-1.5">
      <tspan fill="#09090B">Tailor</tspan><tspan fill="url(#grad-primary)">CV</tspan>
    </text>
  </g>

  <!-- === VERSION: DARK bg === -->
  <g id="logo-dark" display="none">
    <text x="0" y="38"
      font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif"
      font-size="36" font-weight="800" letter-spacing="-1.5">
      <tspan fill="#FAFAFA">Tailor</tspan><tspan fill="url(#grad-primary)">CV</tspan>
    </text>
  </g>

  <!-- === VERSION: MONO BLACK === -->
  <g id="logo-mono-black" display="none">
    <text x="0" y="38"
      font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif"
      font-size="36" font-weight="800" fill="#09090B" letter-spacing="-1.5">TailorCV</text>
  </g>

  <!-- === VERSION: MONO WHITE === -->
  <g id="logo-mono-white" display="none">
    <text x="0" y="38"
      font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif"
      font-size="36" font-weight="800" fill="#FAFAFA" letter-spacing="-1.5">TailorCV</text>
  </g>

</svg>
